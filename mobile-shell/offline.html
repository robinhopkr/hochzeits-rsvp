<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Keine Verbindung</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fffcf7;
        --surface: rgba(255, 255, 255, 0.96);
        --border: rgba(21, 24, 28, 0.08);
        --text: #282c31;
        --muted: #6b7280;
        --gold: #d49a1d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top))
          max(24px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom))
          max(24px, env(safe-area-inset-left));
        background:
          radial-gradient(circle at top, rgba(212, 154, 29, 0.18), transparent 32%),
          linear-gradient(180deg, #fffaf1 0%, var(--bg) 100%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .card {
        width: min(460px, 100%);
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--surface);
        box-shadow: 0 20px 60px rgba(21, 24, 28, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.65rem;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.55;
      }

      button {
        margin-top: 12px;
        border: 0;
        border-radius: 999px;
        background: var(--gold);
        color: white;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        padding: 14px 20px;
      }

      .meta {
        margin-top: 14px;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Die App ist gerade nicht erreichbar.</h1>
      <p>Die mobile Version lädt deine gehostete Hochzeits-App. Prüfe bitte Internetverbindung und Server-Status.</p>
      <p class="meta" id="target"></p>
      <button type="button" id="retryButton">Erneut versuchen</button>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const target = params.get('target');
      const targetLabel = document.getElementById('target');
      const retryButton = document.getElementById('retryButton');

      if (target && targetLabel) {
        targetLabel.textContent = `Ziel: ${target}`;
      }

      retryButton?.addEventListener('click', () => {
        if (target) {
          window.location.replace(target);
          return;
        }

        window.location.reload();
      });
    </script>
  </body>
</html>
